
name: Java CI with Maven

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
      name: Appium Test For (${{ matrix.platform }})
      runs-on: ubuntu-latest
      strategy:
        matrix:
          api-level: [ 29 ]
          platform: [android]
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v3
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: maven

        - name: Download .env from Gist
          run: curl -o .env "${{ secrets.GIST_ENV_URL }}"

        - name: Export .env variables
          run: |
            while IFS='=' read -r key value; do
              [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
              value="${value%\"}"
              value="${value#\"}"
              echo "$key=$value" >> $GITHUB_ENV
            done < .env

        - name: Enable KVM
          run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm

        - name: Gradle cache
          uses: gradle/actions/setup-gradle@v3

        - name: AVD cache
          uses: actions/cache@v4
          id: avd-cache
          with:
            path: |
              ~/.android/avd/*
              ~/.android/adb*
            key: avd-${{ matrix.api-level }}

        - name: Install Appium & UIAutomator2
          run: |
            npm init -y
            npm install appium
            npx appium driver install uiautomator2

        - name: Start Appium
          run: npx appium --port 4723 &

        - name: Run Appium & Maven tests
          uses: reactivecircus/android-emulator-runner@v2
          with:
            api-level: ${{ matrix.api-level }}
            avd-name: test
            emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
            disable-animations: false
            script: |
              mvn clean test -DsuiteXmlFile=suites/MainTestSuite.xml -Dplatform='${{ matrix.platform }}'

        - name: Upload Screenshots of the Failed Tests
          if: ${{ failure() }}
          uses: actions/upload-artifact@v4
          with:
            name: Screenshots of failed tests
            path: src/main/screenshots/**

        - name: Upload Test Video Recording
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: Test Video Recording
            path: src/main/recordings/test.mp4

        - name: Upload Test Report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: Cucumber Test Report
            path: target/cucumber-report.html